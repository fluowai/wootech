# MEXUS AI CORE - Infraestrutura de IA Privada e Auto-Hospedada
# -----------------------------------------------------------
# Esta configuração provisiona o gateway MEXUS, motores de inferência LLM,
# bancos vetoriais e ferramentas de observabilidade.

version: '3.8'

services:
  # Central de Administração MEXUS
  mexus-ai-admin:
    image: mexus/ai-admin:latest
    ports:
      - "3100:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://mexus:mexus123@postgres:5432/mexus_db
      - REDIS_URL=redis://redis:6379
      - QDRANT_URL=http://qdrant:6333
      - GATEWAY_URL=http://mexus-ai-gateway:3200
    depends_on:
      - postgres
      - redis
      - qdrant

  # Gateway de IA Unificado (Proxy MEXUS)
  mexus-ai-gateway:
    image: mexus/ai-gateway:latest
    ports:
      - "3200:3200"
    environment:
      - PORT=3200
      - LITEL_PROXY_URL=http://litellm:4000
    depends_on:
      - litellm

  # LiteLLM Proxy (OpenAI Compatibility Layer)
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    ports:
      - "4000:4000"
    volumes:
      - ./litellm_config.yaml:/app/config.yaml
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    depends_on:
      - ollama

  # Motor de Inferência Ollama (Início Simples / CPU)
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  # Motor de Inferência vLLM (Produção / GPU)
  # vllm:
  #   image: vllm/vllm-openai:latest
  #   ports:
  #     - "8000:8000"
  #   runtime: nvidia
  #   environment:
  #     - NVIDIA_VISIBLE_DEVICES=all
  #   command: ["--model", "Qwen/Qwen2.5-72B-Instruct", "--gpu-memory-utilization", "0.95"]

  # Banco de Dados Relacional (SaaS Management)
  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=mexus
      - POSTGRES_PASSWORD=mexus123
      - POSTGRES_DB=mexus_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Cache e Filas
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data

  # Banco de Dados Vetorial (RAG)
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  # Storage de Arquivos (Documentos RAG)
  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=mexus
      - MINIO_ROOT_PASSWORD=mexus_secret
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  # Monitoramento
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  ollama_data:
  postgres_data:
  redis_data:
  qdrant_data:
  minio_data:
